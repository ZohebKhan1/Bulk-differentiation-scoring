<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 425"
     font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="flowArrow" markerWidth="8" markerHeight="6"
            refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#000"/>
    </marker>
  </defs>

  <!-- Step 1 -->
  <rect x="20" y="12" width="220" height="36" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="130" y="35" text-anchor="middle"
        font-size="12" fill="#000">
    1. RNA-seq Count Matrix
  </text>

  <!-- Arrow 1-2 -->
  <line x1="130" y1="48" x2="130" y2="62"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 2 -->
  <rect x="20" y="64" width="220" height="36" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="130" y="87" text-anchor="middle"
        font-size="12" fill="#000">
    2. Subset Control Samples
  </text>

  <!-- Arrow 2-3 -->
  <line x1="130" y1="100" x2="130" y2="114"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 3 -->
  <rect x="20" y="116" width="220" height="36" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="130" y="139" text-anchor="middle"
        font-size="12" fill="#000">
    3. DESeq2 LRT
  </text>

  <!-- Arrow 3-4 -->
  <line x1="130" y1="152" x2="130" y2="166"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 4 -->
  <rect x="20" y="168" width="220" height="36" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="130" y="191" text-anchor="middle"
        font-size="12" fill="#000">
    4. Select Temporal Genes
  </text>

  <!-- Arrow 4-5 -->
  <line x1="130" y1="204" x2="130" y2="218"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 5 -->
  <rect x="20" y="220" width="220" height="36" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="130" y="243" text-anchor="middle"
        font-size="12" fill="#000">
    5. PCA on Control Samples
  </text>

  <!-- Arrow 5-6 -->
  <line x1="130" y1="256" x2="130" y2="270"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 6 -->
  <rect x="20" y="272" width="220" height="36" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="130" y="295" text-anchor="middle"
        font-size="12" fill="#000">
    6. Define Centroid Vector
  </text>

  <!-- Arrow 6-7 -->
  <line x1="130" y1="308" x2="130" y2="322"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 7 -->
  <rect x="20" y="324" width="220" height="36" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="130" y="347" text-anchor="middle"
        font-size="12" fill="#000">
    7. Project All Samples
  </text>

  <!-- Arrow 7-8 -->
  <line x1="130" y1="360" x2="130" y2="374"
        stroke="#000" stroke-width="1.2"
        marker-end="url(#flowArrow)"/>

  <!-- Step 8 -->
  <rect x="20" y="376" width="220" height="36" rx="4"
        fill="#fff" stroke="#000" stroke-width="1.2"/>
  <text x="130" y="399" text-anchor="middle"
        font-size="12" fill="#000">
    8. Compute Maturation Score
  </text>

  <!-- Bracket: DATA (steps 1-2) -->
  <path d="M 255,12 L 265,12 L 265,100 L 255,100"
        fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="275" y="60" font-size="11"
        font-weight="600" fill="#000">DATA</text>

  <!-- Bracket: GENES (steps 3-4) -->
  <path d="M 255,116 L 265,116 L 265,204 L 255,204"
        fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="275" y="164" font-size="11"
        font-weight="600" fill="#000">GENES</text>

  <!-- Bracket: TRAJECTORY (steps 5-6) -->
  <path d="M 255,220 L 265,220 L 265,308 L 255,308"
        fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="275" y="260" font-size="11"
        font-weight="600" fill="#000">
    <tspan x="275" dy="0">TRAJ-</tspan>
    <tspan x="275" dy="14">ECTORY</tspan>
  </text>

  <!-- Bracket: SCORE (steps 7-8) -->
  <path d="M 255,324 L 265,324 L 265,412 L 255,412"
        fill="none" stroke="#000" stroke-width="1.2"/>
  <text x="275" y="372" font-size="11"
        font-weight="600" fill="#000">SCORE</text>
</svg>
